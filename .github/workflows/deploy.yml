name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Trigger pull on web server
        env:
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          set -euo pipefail
          umask 077
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/deploy_key
          chmod 644 ~/.ssh/known_hosts
          # The authorized_keys entry on the server pins this key to a single
          # forced command (`command="..."`). Whatever we send here is ignored;
          # we still send a sentinel so the server's SSH log shows intent.
          ssh -i ~/.ssh/deploy_key \
              -o UserKnownHostsFile=~/.ssh/known_hosts \
              -o IdentitiesOnly=yes \
              "$SSH_USER@$SSH_HOST" \
              deploy
